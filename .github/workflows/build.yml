name: Build & Test APK

on:
  push:
    branches: [master, main, dev, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      buildType:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - all

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" -Dorg.gradle.parallel=true
  ANDROID_SDK_VERSION: '34'

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint --no-daemon --continue

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          retention-days: 14

  build-debug:
    name: Build Debug APK
    needs: unit-test
    if: |
      always() &&
      (needs.unit-test.result == 'success' || needs.unit-test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/YueXiaAI-v2.4.0-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: YueXiaAI-debug
          path: app/build/outputs/apk/debug/YueXiaAI-v2.4.0-debug.apk
          retention-days: 30

  build-release:
    name: Build Release APK
    if: github.event_name == 'workflow_dispatch' && (inputs.buildType == 'release' || inputs.buildType == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != null
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'yuexia123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'yuexia123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'yuexia_ai' }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename Release APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/YueXiaAI-v2.4.0-release.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YueXiaAI-release
          path: app/build/outputs/apk/release/YueXiaAI-v2.4.0-release.apk
          retention-days: 90
