name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.2.0)'
        required: true
        default: '1.2.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393 cmake;3.22.1'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/月下AI-v${{ env.VERSION }}.apk

      - name: Create Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/月下AI-v${{ env.VERSION }}.apk
          name: "月下AI v${{ env.VERSION }}"
          body: |
            ## 月下AI v${{ env.VERSION }}

            ### 更新内容
            - 🎭 智能体系统：支持创建/编辑/删除智能体，克隆家人语音人设
            - 🔄 消息撤回：发送者消息支持长按撤回
            - 🧠 思考内容：AI 机器人完整支持显示 reasoning_content
            - 🔍 模型搜索：模型选择下拉框支持搜索过滤
            - 📐 UI 优化：API端点和模型选择框变小，输入框扁平化设计
            - ⚙️ 设置界面优化：移除冗余内容，布局更紧凑

            ### 安装说明
            下载 APK 文件后直接安装即可。Android 8.0+ 设备可用。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: release/月下AI-v${{ env.VERSION }}.apk
          name: "月下AI v${{ env.VERSION }}"
          body: |
            ## 月下AI v${{ env.VERSION }}

            ### 更新内容
            - 🎭 智能体系统：支持创建/编辑/删除智能体，克隆家人语音人设
            - 🔄 消息撤回：发送者消息支持长按撤回
            - 🧠 思考内容：AI 机器人完整支持显示 reasoning_content
            - 🔍 模型搜索：模型选择下拉框支持搜索过滤
            - 📐 UI 优化：API端点和模型选择框变小，输入框扁平化设计
            - ⚙️ 设置界面优化：移除冗余内容，布局更紧凑

            ### 安装说明
            下载 APK 文件后直接安装即可。Android 8.0+ 设备可用。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
