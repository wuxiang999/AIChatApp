name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 2.1.0)'
        required: true
        default: '2.1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393 cmake;3.22.1'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 -d > app/release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEYSTORE_PASSWORD"
            } > keystore.properties
            echo "Release keystore restored."
          else
            echo "No release keystore secret set — build will use debug signing."
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/YueXiaAI-v${{ env.VERSION }}.apk

      - name: Create Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/YueXiaAI-v${{ env.VERSION }}.apk
          name: "月下AI v${{ env.VERSION }}"
          body: |
            ## 月下AI v${{ env.VERSION }}

            ### 更新内容
            - 🔒 安全修复：移除泄露的签名密钥与明文密码
            - 作废旧 keystore，生成全新 keystore（PKCS12 / RSA-2048 / 随机强密码）
            - 签名配置改为从 gitignored 的 keystore.properties 读取，缺失时回退 debug 签名
            - CI 通过 GitHub Secrets 还原 keystore，历史已用 git filter-repo 清理
            - 修复 build.gradle.kts 在 Kotlin DSL 下的编译错误

            ### 安装说明
            ⚠️ 签名证书已更换：历史版本用户需卸载旧版后安装新版（签名不兼容，无法覆盖升级）。
            下载 APK 文件后直接安装即可。Android 8.0+ 设备可用。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: release/YueXiaAI-v${{ env.VERSION }}.apk
          name: "月下AI v${{ env.VERSION }}"
          body: |
            ## 月下AI v${{ env.VERSION }}

            ### 更新内容
            - 🔒 安全修复：移除泄露的签名密钥与明文密码
            - 作废旧 keystore，生成全新 keystore（PKCS12 / RSA-2048 / 随机强密码）
            - 签名配置改为从 gitignored 的 keystore.properties 读取，缺失时回退 debug 签名
            - CI 通过 GitHub Secrets 还原 keystore，历史已用 git filter-repo 清理
            - 修复 build.gradle.kts 在 Kotlin DSL 下的编译错误

            ### 安装说明
            ⚠️ 签名证书已更换：历史版本用户需卸载旧版后安装新版（签名不兼容，无法覆盖升级）。
            下载 APK 文件后直接安装即可。Android 8.0+ 设备可用。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
